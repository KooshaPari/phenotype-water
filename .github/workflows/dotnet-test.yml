name: dotnet test

on:
  push:
    branches: [master, main, chore/**, feat/**, fix/**, refactor/**]
  pull_request:
    branches: [master, main, chore/**, feat/**, fix/**, refactor/**]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: dotnet test (net48)
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      # The library references UnityEngine.CoreModule.dll under $(WorldBoxManaged);
      # the variable is not set in CI, so we compile a stub assembly that
      # exposes the full UnityEngine namespace the project needs. We use the
      # existing src/UnityEngineStubs.cs as the source and target net48 so the
      # stub runs on the same framework as the consuming project.
      - name: Stub UnityEngine.CoreModule
        run: |
          set -euo pipefail
          STUB_DIR=$(mktemp -d)
          cat > "$STUB_DIR/Stub.csproj" <<'EOF'
          <Project Sdk="Microsoft.NET.Sdk">
            <PropertyGroup>
              <TargetFramework>net48</TargetFramework>
              <AssemblyName>UnityEngine.CoreModule</AssemblyName>
              <RootNamespace>UnityEngine</RootNamespace>
            </PropertyGroup>
            <ItemGroup>
              <Compile Include="$(pwd)/src/UnityEngineStubs.cs" />
            </ItemGroup>
          </Project>
          EOF
          dotnet build "$STUB_DIR/Stub.csproj" -c Release --nologo
          echo "WorldBoxManaged=$STUB_DIR/bin/Release/net48" >> $GITHUB_ENV

      - name: Restore
        run: dotnet restore phenotype-water.slnx

      - name: Build
        run: dotnet build phenotype-water.slnx -c Release --no-restore

      - name: Test
        run: dotnet test tests/phenotype-water.tests.csproj -c Release --no-build --verbosity normal

      - name: Format
        run: dotnet format phenotype-water.slnx --verify-no-changes --verbosity diagnostic
