# OpenSSF Scorecard policy
# Schema: https://github.com/ossf/scorecard/blob/main/docs/policy.md
# Enforced by the scorecard-action workflow in .github/workflows/scorecard.yml.

version: 2

# Default policy applied to every check. Use the highest available score
# (10) as the floor for code-review and security-related checks so that
# any regression on the main branch fails the policy gate.
defaults:
  disallow_errors: true
  disallow_warnings: true
  result_failure_threshold: 8
  result_warning_threshold: 9
  policies: []

# Per-check policies. Each entry narrows the global defaults for a single
# check; the policy must hold for the workflow run to pass.
checks:
  - id: Binary-Artifacts
    policy:
      disallow_errors: true
      disallow_warnings: true
      result_failure_threshold: 10
      result_warning_threshold: 10
      policies: []

  - id: Branch-Protection
    policy:
      disallow_errors: true
      disallow_warnings: true
      result_failure_threshold: 8
      result_warning_threshold: 9
      policies: []

  - id: Code-Review
    policy:
      disallow_errors: true
      disallow_warnings: true
      result_failure_threshold: 9
      result_warning_threshold: 10
      policies: []

  - id: Dangerous-Workflow
    policy:
      disallow_errors: true
      disallow_warnings: true
      result_failure_threshold: 10
      result_warning_threshold: 10
      policies: []

  - id: Dependency-Update-Tool
    policy:
      disallow_errors: true
      disallow_warnings: false
      result_failure_threshold: 7
      result_warning_threshold: 10
      policies: []

  - id: Pinned-Dependencies
    policy:
      disallow_errors: true
      disallow_warnings: true
      result_failure_threshold: 8
      result_warning_threshold: 9
      policies: []

  - id: SAST
    policy:
      disallow_errors: true
      disallow_warnings: false
      result_failure_threshold: 7
      result_warning_threshold: 10
      policies: []

  - id: Security-Policy
    policy:
      disallow_errors: true
      disallow_warnings: true
      result_failure_threshold: 9
      result_warning_threshold: 10
      policies: []

  - id: Token-Permissions
    policy:
      disallow_errors: true
      disallow_warnings: true
      result_failure_threshold: 10
      result_warning_threshold: 10
      policies: []
